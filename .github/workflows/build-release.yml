name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download cloudflared binary
        run: |
          mkdir -p cloudflared
          curl -L "https://github.com/cloudflare/cloudflared/releases/download/2026.6.0/cloudflared-darwin-arm64" -o cloudflared/cloudflared-darwin-arm64
          chmod +x cloudflared/cloudflared-darwin-arm64

      - name: Build DMG
        run: npx electron-forge make --platform darwin --arch arm64
        env:
          PCONAIR_BUILD_DATE: ${{ github.ref_name }}

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          draft: false
          files: out/make/**/*.dmg
          body: |
            ## PConAir ${{ github.ref_name }}

            Unsigned build for internal testing.

            **macOS:** Open the DMG, drag PConAir to Applications.
            First launch: right-click → Open to bypass Gatekeeper.

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        if: github.event_name != 'push'
        with:
          name: macos-dmg
          path: out/make/**/*.dmg

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download cloudflared binary
        run: |
          mkdir -p cloudflared
          curl -L "https://github.com/cloudflare/cloudflared/releases/download/2026.6.0/cloudflared-windows-amd64.exe" -o cloudflared/cloudflared-windows-amd64.exe

      - name: Build Windows ZIP
        run: npx electron-forge make --platform win32 --arch x64
        env:
          PCONAIR_BUILD_DATE: ${{ github.ref_name }}

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          draft: false
          files: out/make/**/*.zip
          body: |
            ## PConAir ${{ github.ref_name }}

            Unsigned build for internal testing.

            **Windows:** Extract the ZIP and run PConAir.exe.

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        if: github.event_name != 'push'
        with:
          name: windows-dist
          path: out/make/**/*.zip
