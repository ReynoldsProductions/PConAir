<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Score Demo Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/packages/demo-scores/assets/style.css" />
<style>
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .team-grid { display:grid; grid-template-columns:auto 1fr 1fr 1fr 1fr; gap:6px; align-items:center; }
  .team-grid .col-head { font-size:9px; letter-spacing:.14em; color:var(--sub); }
  .team-grid .idx { font-size:11px; color:var(--sub); text-align:center; font-family:var(--mono); }
  .score-row { display:flex; align-items:center; gap:12px; }
  .score-val { font-family:var(--mono); font-size:32px; font-weight:700; min-width:60px; text-align:center; }
  .btn-sm { padding:8px 14px; font-size:14px; font-weight:700; }
  .h2h-row { display:flex; align-items:center; gap:10px; }
  .h2h-row .slot-lbl { font-size:11px; font-family:var(--mono); color:var(--sub); width:60px; flex-shrink:0; }
  .h2h-row .vs { font-size:11px; color:var(--sub); padding:0 4px; }
  .clock-display { font-family:var(--mono); font-size:36px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
  .clock-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .shot-display { font-family:var(--mono); font-size:36px; font-weight:700; color:var(--red); font-variant-numeric:tabular-nums; min-width:56px; text-align:center; }
  .save-msg { font-size:11px; color:var(--green); min-height:16px; }
  select { appearance:none; }
  .winner-row { display:flex; align-items:center; gap:10px; }
  textarea { resize:vertical; min-height:100px; }
  .show-section { display:flex; flex-direction:column; gap:10px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Score Demo</h1>
    <span class="status-pill offline" id="status-pill">CONNECTING…</span>
  </div>
</div>

<div class="section">
  <div class="section-label">Teams</div>
  <div class="team-grid">
    <div class="idx"></div>
    <div class="col-head">NAME</div>
    <div class="col-head">CITY</div>
    <div class="col-head">CODE</div>
    <div class="col-head">PRESENTER</div>
  </div>
  <div id="team-edit-rows" style="display:flex;flex-direction:column;gap:6px;"></div>
  <div class="row">
    <button class="btn-primary" id="btn-save-teams">SAVE TEAMS</button>
    <div class="save-msg" id="teams-msg"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Scores</div>
  <div id="score-rows" style="display:flex;flex-direction:column;gap:8px;"></div>
  <div class="row">
    <button class="btn-danger" id="btn-reset-scores">RESET ALL</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Shot Clock</div>
  <div class="clock-row">
    <div class="shot-display" id="shot-disp">24</div>
    <input type="number" id="shot-sec" value="24" min="1" max="60" style="width:64px;text-align:center;" />
    <span style="font-size:11px;color:var(--sub);">sec</span>
    <button class="btn-success" id="btn-shot-start">▶ START</button>
    <button class="btn-danger" id="btn-shot-stop">■ STOP</button>
    <button id="btn-shot-reset">↺ RESET</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Head-to-Head</div>
  <div id="h2h-rows" style="display:flex;flex-direction:column;gap:8px;"></div>
  <div class="row">
    <button class="btn-primary" id="btn-save-h2h">SAVE MATCHUPS</button>
    <div class="save-msg" id="h2h-msg"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Clock</div>
  <div class="clock-row">
    <div class="clock-display" id="clock-disp">--:--</div>
    <input type="number" id="clock-min" min="1" max="180" value="5" style="width:72px;text-align:center;" />
    <span style="font-size:11px;color:var(--sub);">min</span>
    <button class="btn-success" id="btn-clock-start">▶ START</button>
    <button class="btn-danger" id="btn-clock-stop">■ STOP</button>
    <button id="btn-clock-reset">↺ RESET</button>
  </div>
</div>

<div class="section show-section">
  <div class="section-label">Show</div>

  <div>
    <label>Active Render</label>
    <select id="active-render-select">
      <option value="scoreboard">Scoreboard</option>
      <option value="h2h">Head-to-Head</option>
      <option value="champion">Champion</option>
      <option value="ticker">Ticker</option>
    </select>
  </div>

  <div class="winner-row">
    <div style="flex:1;">
      <label>Winner</label>
      <select id="winner-select"></select>
    </div>
    <button class="btn-primary" id="btn-set-winner">SET WINNER</button>
    <button id="btn-clear-winner">CLEAR</button>
  </div>
  <div style="font-size:12px;color:var(--sub);" id="winner-now"></div>

  <div>
    <label>Ticker Messages (one per line)</label>
    <textarea id="ticker-messages" rows="4"></textarea>
  </div>
  <div class="row">
    <div style="flex:1;">
      <label>Ticker Label</label>
      <input type="text" id="ticker-label" />
    </div>
  </div>
  <div class="row">
    <button class="btn-success" id="btn-ticker-show">SHOW TICKER</button>
    <button class="btn-danger" id="btn-ticker-hide">HIDE TICKER</button>
    <button class="btn-primary" id="btn-ticker-save">SAVE & SHOW</button>
  </div>
</div>

<script src="/packages/demo-scores/assets/state.js"></script>
<script>
  const g = id => document.getElementById(id);
  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

  let state = null;
  let teamsKey = '';

  const client = PConAirPackage.connect('demo-scores', (s) => {
    state = s;
    g('status-pill').className = 'status-pill live';
    g('status-pill').textContent = 'LIVE';
    render();
  });

  function patch(p) { client.patch(p); }

  // ── Shot Clock ─────────────────────────────────────────────────
  function shotRemainingS() {
    const d = +((state && state.shotEndsAt) || 0);
    const v = +((state && state.shotClock) || 0);
    if (d > 0) return Math.max(0, (d - Date.now()) / 1000);
    return Math.max(0, v);
  }

  setInterval(() => {
    if (!state) return;
    const s = shotRemainingS();
    g('shot-disp').textContent = s <= 9.95 ? s.toFixed(1) : Math.ceil(s);
  }, 100);

  g('btn-shot-start').addEventListener('click', () => {
    const sec = shotRemainingS() || +g('shot-sec').value || 24;
    patch({ shotEndsAt: Date.now() + sec * 1000, shotClock: Math.ceil(sec) });
  });
  g('btn-shot-stop').addEventListener('click', () => {
    patch({ shotEndsAt: 0, shotClock: Math.ceil(shotRemainingS()) });
  });
  g('btn-shot-reset').addEventListener('click', () => {
    const sec = +g('shot-sec').value || 24;
    patch({ shotEndsAt: 0, shotClock: sec });
  });

  // ── Clock ──────────────────────────────────────────────────────
  function clockRemainingS() {
    const c = (state && state.clock) || {};
    if (c.running && c.deadline > 0) return Math.max(0, (c.deadline - Date.now()) / 1000);
    return typeof c.value === 'number' ? Math.max(0, c.value) : +g('clock-min').value * 60 || 300;
  }

  function fmtClock(s) {
    if (s === null || s === undefined) return '--:--';
    const m = Math.floor(s/60), ss = Math.floor(s%60);
    return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  }

  setInterval(() => {
    if (!state) return;
    g('clock-disp').textContent = fmtClock(clockRemainingS());
  }, 250);

  g('btn-clock-start').addEventListener('click', () => {
    const sec = clockRemainingS();
    patch({ clock: { running: true, value: null, deadline: Date.now() + sec * 1000 } });
  });
  g('btn-clock-stop').addEventListener('click', () => {
    patch({ clock: { running: false, value: clockRemainingS(), deadline: 0 } });
  });
  g('btn-clock-reset').addEventListener('click', () => {
    patch({ clock: { running: false, deadline: 0, value: (+g('clock-min').value || 5) * 60 } });
  });

  // ── Render ──────────────────────────────────────────────────────
  function render() {
    if (!state) return;
    const key = JSON.stringify(state.teams);
    if (key !== teamsKey) {
      teamsKey = key;
      buildTeamEditRows();
      buildScoreRows();
      buildH2HRows();
      buildWinnerSelect();
    }
    // Update score values
    (state.teams || []).forEach((t, i) => {
      const el = g('score-val-' + i);
      if (el) el.textContent = state.scores[i] ?? 0;
    });
    // Sync clock-min if stopped
    const c = state.clock || {};
    if (!c.running && typeof c.value === 'number' && document.activeElement !== g('clock-min')) {
      g('clock-min').value = Math.round(c.value / 60) || 5;
    }
    // active render
    const ar = g('active-render-select');
    if (ar && document.activeElement !== ar) ar.value = state.activeRender || 'scoreboard';
    // winner
    g('winner-now').textContent = typeof state.winner === 'number'
      ? 'Winner: ' + (state.teams[state.winner] || {}).name
      : 'No winner set';
    // ticker fields
    const ticker = state.ticker || {};
    if (document.activeElement !== g('ticker-messages')) {
      g('ticker-messages').value = (ticker.messages || []).join('\n');
    }
    if (document.activeElement !== g('ticker-label')) {
      g('ticker-label').value = ticker.label || '';
    }
  }

  function buildTeamEditRows() {
    const wrap = g('team-edit-rows');
    wrap.innerHTML = '';
    (state.teams || []).forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'team-grid';
      row.innerHTML = `
        <div class="idx">${i+1}</div>
        <input type="text" id="t${i}-name" value="${esc(t.name)}" placeholder="Team ${i+1}" maxlength="64" />
        <input type="text" id="t${i}-city" value="${esc(t.city)}" placeholder="CITY" maxlength="64" />
        <input type="text" id="t${i}-code" value="${esc(t.code)}" placeholder="T${i+1}" maxlength="8" />
        <input type="text" id="t${i}-presenter" value="${esc(t.presenter)}" placeholder="presenter" maxlength="64" />`;
      wrap.appendChild(row);
    });
  }

  function buildScoreRows() {
    const wrap = g('score-rows');
    wrap.innerHTML = '';
    (state.teams || []).forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML = `
        <div style="flex:1;font-size:16px;font-weight:600;">${esc(t.name)}</div>
        <button class="btn-sm btn-danger" data-idx="${i}" data-delta="-1">−</button>
        <div class="score-val" id="score-val-${i}">${state.scores[i] ?? 0}</div>
        <button class="btn-sm btn-primary" data-idx="${i}" data-delta="1">+</button>`;
      wrap.appendChild(row);
    });
  }

  g('score-rows').addEventListener('click', e => {
    const btn = e.target.closest('[data-idx]');
    if (!btn || !state) return;
    const i = +btn.dataset.idx;
    const next = (state.scores || []).slice();
    next[i] = Math.max(0, (+next[i] || 0) + +btn.dataset.delta);
    patch({ scores: next });
  });

  g('btn-reset-scores').addEventListener('click', () => patch({ scores: [0,0,0,0] }));

  function buildH2HRows() {
    const wrap = g('h2h-rows');
    wrap.innerHTML = '';
    const h2h = state.h2h || { a: { left:0, right:1 }, b: { left:2, right:3 } };
    const teamOpts = (sel) => (state.teams || []).map((t, i) =>
      `<option value="${i}" ${i === sel ? 'selected' : ''}>${i+1} · ${esc(t.name)}</option>`
    ).join('');
    [['a', h2h.a || {left:0,right:1}], ['b', h2h.b || {left:2,right:3}]].forEach(([slot, cfg]) => {
      const row = document.createElement('div');
      row.className = 'h2h-row';
      row.innerHTML = `
        <div class="slot-lbl">SLOT ${slot.toUpperCase()}</div>
        <select id="h2h-${slot}-left">${teamOpts(cfg.left)}</select>
        <div class="vs">VS</div>
        <select id="h2h-${slot}-right">${teamOpts(cfg.right)}</select>`;
      wrap.appendChild(row);
    });
  }

  function buildWinnerSelect() {
    const sel = g('winner-select');
    const cur = sel.value;
    sel.innerHTML = (state.teams || []).map((t, i) =>
      `<option value="${i}">${i+1} · ${esc(t.name)}</option>`
    ).join('');
    if (cur !== '') sel.value = cur;
  }

  g('btn-save-teams').addEventListener('click', () => {
    const teams = [0,1,2,3].map(i => ({
      name: g(`t${i}-name`).value.trim() || `Team ${i+1}`,
      city: g(`t${i}-city`).value.trim(),
      code: g(`t${i}-code`).value.trim() || `T${i+1}`,
      presenter: g(`t${i}-presenter`).value.trim(),
    }));
    patch({ teams });
    flash('teams-msg', 'Saved ✓');
  });

  g('btn-save-h2h').addEventListener('click', () => {
    patch({
      h2h: {
        a: { left: +g('h2h-a-left').value, right: +g('h2h-a-right').value },
        b: { left: +g('h2h-b-left').value, right: +g('h2h-b-right').value },
      }
    });
    flash('h2h-msg', 'Saved ✓');
  });

  g('active-render-select').addEventListener('change', e => {
    patch({ activeRender: e.target.value });
  });

  g('btn-set-winner').addEventListener('click', () => {
    patch({ winner: +g('winner-select').value });
  });
  g('btn-clear-winner').addEventListener('click', () => {
    patch({ winner: null });
  });

  g('btn-ticker-show').addEventListener('click', () => patch({ ticker: { ...((state && state.ticker) || {}), visible: true } }));
  g('btn-ticker-hide').addEventListener('click', () => patch({ ticker: { ...((state && state.ticker) || {}), visible: false } }));
  g('btn-ticker-save').addEventListener('click', () => {
    const messages = g('ticker-messages').value.split('\n').map(s => s.trim()).filter(Boolean);
    const label = g('ticker-label').value.trim();
    const base = (state && state.ticker) || {};
    patch({ ticker: { ...base, messages, label: label || base.label || 'DEMO', visible: true } });
  });

  function flash(id, msg) {
    g(id).textContent = msg;
    setTimeout(() => { if (g(id)) g(id).textContent = ''; }, 3000);
  }
</script>
</body>
</html>
