<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Score Demo — Head-to-Head</title>
<style>
  :root {
    --bg: #1a1a1e;
    --ink: #f0f0f2;
    --sub: #888890;
    --accent: #6c8fff;
    --danger: #ff4444;
    --mono: ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }
  body.obs { background: transparent; }
  #stage { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr auto 1fr; }

  /* Team sides */
  .side { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; }
  .side-city { font-size: 16px; letter-spacing: .22em; color: var(--sub); text-transform: uppercase; }
  .side-name { font-size: 72px; font-weight: 700; line-height: 1; text-align: center; }
  .side-score { font-family: var(--mono); font-size: 160px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .side.left .side-score { color: var(--accent); }

  /* Center column — game clock + shot clock */
  .center {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 48px; gap: 8px;
    border-left: 1px solid rgba(255,255,255,.08);
    border-right: 1px solid rgba(255,255,255,.08);
  }
  .game-clock { font-family: var(--mono); font-size: 40px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
  .vs-label { font-family: var(--mono); font-size: 20px; font-weight: 700; letter-spacing: .3em; color: var(--sub); margin: 8px 0; }

  /* Shot clock */
  .shot-wrap {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px; padding: 10px 20px; min-width: 100px; text-align: center;
  }
  .shot-val { font-family: var(--mono); font-size: 52px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; line-height: 1; }
  .shot-label { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--sub); margin-top: 4px; }
  /* Danger state — applied by pconair-kit when ≤ 5s */
  .shot-wrap.danger { border-color: var(--danger); animation: shot-pulse .7s ease-in-out infinite; }
  .shot-wrap.danger .shot-val { color: var(--danger); }
  @keyframes shot-pulse { 0%,100%{opacity:1;} 50%{opacity:.45;} }
</style>
</head>
<body>
<div id="stage">
  <div class="side left">
    <div class="side-city" id="left-city"></div>
    <div class="side-name" id="left-name"></div>
    <div class="side-score" id="left-score">0</div>
  </div>

  <div class="center">
    <div class="game-clock" id="game-clock">--:--</div>
    <div class="vs-label">VS</div>
    <div class="shot-wrap" id="shot-wrap">
      <div class="shot-val" id="shot-val">24</div>
      <div class="shot-label">SHOT</div>
    </div>
  </div>

  <div class="side right">
    <div class="side-city" id="right-city"></div>
    <div class="side-name" id="right-name"></div>
    <div class="side-score" id="right-score">0</div>
  </div>
</div>

<script src="/packages/demo-scores/assets/state.js"></script>
<script src="/packages/demo-scores/assets/pconair-kit.js"></script>
<script>
  const kit = PConAirKit.init('demo-scores');

  // Game clock and shot clock — both deadline-based, auto-ticking
  kit.gameClock({ deadline: 'clock.deadline', value: 'clock.value', el: '#game-clock' });
  kit.shotClock({ deadline: 'shotEndsAt', value: 'shotClock', el: '#shot-val', dangerAt: 5, dangerClass: 'danger' });

  // The danger class needs to land on the wrapper for the border animation
  // onState bridges: mirror .danger from the inner val to the wrapper
  kit.onState(s => {
    const now = Date.now();
    const d = +s.shotEndsAt || 0;
    const v = +s.shotClock || 0;
    const rem = d > 0 ? Math.max(0, (d - now) / 1000) : v;
    document.getElementById('shot-wrap').classList.toggle('danger', rem <= 5 && (d > 0 || v > 0));
  });

  // Resolve h2h slot and populate team sides
  kit.onState(s => {
    const h2h = s.h2h || { a: { left: 0, right: 1 } };
    const slot = h2h.a || { left: 0, right: 1 };
    const teams = s.teams || [];
    const scores = s.scores || [0, 0, 0, 0];
    const li = Math.max(0, Math.min(3, +slot.left || 0));
    const ri = Math.max(0, Math.min(3, +slot.right || 1));
    const lt = teams[li] || {};
    const rt = teams[ri] || {};
    document.getElementById('left-city').textContent = lt.city || '';
    document.getElementById('left-name').textContent = lt.name || '';
    document.getElementById('left-score').textContent = scores[li] ?? 0;
    document.getElementById('right-city').textContent = rt.city || '';
    document.getElementById('right-name').textContent = rt.name || '';
    document.getElementById('right-score').textContent = scores[ri] ?? 0;
  });

  if (new URLSearchParams(location.search).get('obs')) document.body.classList.add('obs');
</script>
</body>
</html>
