<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COURTVISION — basketball scorebug</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Saira:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0f14; --bg2:#141a22; --panel:#1b232e; --ink:#eef3f7; --sub:#90a0b2;
    --line:rgba(255,255,255,.10); --amber:#ffb515; --red:#ff2e3e; --live:#ff2e3e;
    --a:#007A33; --b:#552583; --bgold:#FDB927;
    --cond:'Saira Condensed',sans-serif; --sans:'Saira',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  #stage{position:absolute;inset:0;}

  /* network bug (top-left) */
  .netbug{position:absolute;top:30px;left:42px;display:flex;align-items:center;gap:14px;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,.5));}
  .netbug .logo{font-family:var(--cond);font-weight:800;font-size:30px;letter-spacing:.04em;color:#fff;
    background:linear-gradient(135deg,var(--amber),#ff7a00);padding:4px 14px;border-radius:6px;color:#15130a;}
  .netbug .info{font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:#e7eef5;text-shadow:0 2px 8px rgba(0,0,0,.6);}
  .netbug .info .live{color:var(--live);}

  /* ── SCOREBUG (bottom center) ── */
  .bug{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);
    display:flex;align-items:stretch;height:94px;border-radius:12px;overflow:visible;
    background:linear-gradient(180deg,var(--bg2),var(--bg));border:1px solid var(--line);
    box-shadow:0 18px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);font-family:var(--cond);}

  .team{display:flex;align-items:center;gap:16px;padding:0 22px;position:relative;}
  .team .tab{position:absolute;top:14px;bottom:14px;width:7px;border-radius:4px;}
  .team.a .tab{left:0;background:var(--a);} .team.b .tab{right:0;background:var(--b);}
  .team .logo{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:26px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.5);}
  .team.a .logo{background:radial-gradient(circle at 35% 30%,#0b9c44,#005f28);}
  .team.b .logo{background:radial-gradient(circle at 35% 30%,#6c33a8,#3d1a5e);border:2px solid var(--bgold);}
  .team .abbr{font-weight:700;font-size:30px;letter-spacing:.04em;color:#fff;}
  .team .score{font-weight:800;font-size:62px;line-height:.9;color:#fff;min-width:84px;text-align:center;
    font-variant-numeric:tabular-nums;text-shadow:0 3px 10px rgba(0,0,0,.5);}
  .team.a{padding-left:26px;} .team.b{padding-right:26px;flex-direction:row-reverse;}
  .team.active .score{color:var(--amber);} /* possession highlight */
  .team .poss{width:0;height:0;opacity:0;border-top:9px solid transparent;border-bottom:9px solid transparent;}
  .team.a .poss{border-left:13px solid var(--amber);}
  .team.b .poss{border-right:13px solid var(--amber);}
  .team.active .poss{opacity:1;animation:bob 1s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(-3px);}}

  /* center module */
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 26px;background:linear-gradient(180deg,#0a0d12,#10151c);position:relative;min-width:210px;
    border-left:1px solid var(--line);border-right:1px solid var(--line);}
  .center .clock{font-weight:700;font-size:42px;line-height:1;letter-spacing:.02em;color:#fff;font-variant-numeric:tabular-nums;text-shadow:0 0 14px rgba(120,180,255,.25);}
  .center .meta{display:flex;align-items:center;gap:12px;margin-top:5px;font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);}
  .center .qtr{color:#fff;background:var(--red);padding:1px 9px;border-radius:4px;letter-spacing:.08em;}
  .center .bonus{color:#0c0f14;background:var(--amber);padding:1px 7px;border-radius:3px;font-weight:700;}

  /* shot clock — mounted above center */
  .shot{position:absolute;top:-34px;left:50%;transform:translateX(-50%);
    width:78px;height:64px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#241a02,#181203);border:2px solid var(--amber);
    box-shadow:0 8px 22px rgba(0,0,0,.6),0 0 18px rgba(255,181,21,.35);}
  .shot .v{font-weight:800;font-size:40px;line-height:.9;color:var(--amber);font-variant-numeric:tabular-nums;text-shadow:0 0 12px rgba(255,181,21,.6);}
  .shot .l{font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:.18em;color:#caa24a;margin-top:1px;}
  .shot.danger{border-color:var(--red);box-shadow:0 8px 22px rgba(0,0,0,.6),0 0 22px rgba(255,46,62,.6);animation:shotpulse .7s ease-in-out infinite;}
  .shot.danger .v{color:var(--red);text-shadow:0 0 14px rgba(255,46,62,.8);}
  .shot.danger .l{color:#e0808a;}
  @keyframes shotpulse{0%,100%{opacity:1;} 50%{opacity:.45;}}

  /* timeouts row under teams */
  .tos{position:absolute;bottom:-22px;display:flex;gap:5px;}
  .team.a .tos{left:26px;} .team.b .tos{right:26px;flex-direction:row-reverse;}
  .tos i{width:18px;height:4px;border-radius:2px;background:#3a4658;}
  .tos i.on{background:var(--amber);}

  /* player stat card (left) — .in class slides it on air */
  .card{position:absolute;left:42px;bottom:150px;width:372px;border-radius:12px;overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--bg));border:1px solid var(--line);
    box-shadow:0 18px 50px rgba(0,0,0,.55);transform:translateX(-440px);
    transition:transform .6s cubic-bezier(.2,.7,.2,1);}
  .card.in{transform:none;}
  .card .hd{display:flex;align-items:center;gap:14px;padding:12px 16px;background:linear-gradient(90deg,var(--a),rgba(0,122,51,0));}
  .card .num{font-family:var(--cond);font-weight:800;font-size:38px;color:#fff;line-height:1;}
  .card .who .nm{font-family:var(--cond);font-weight:700;font-size:26px;color:#fff;line-height:1;}
  .card .who .pos{font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#bfe9cf;margin-top:3px;}
  .card .stats{display:flex;}
  .card .st{flex:1;padding:12px 6px;text-align:center;border-right:1px solid var(--line);}
  .card .st:last-child{border-right:none;}
  .card .st .n{font-family:var(--cond);font-weight:800;font-size:34px;color:#fff;line-height:1;}
  .card .st .k{font-family:var(--sans);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-top:4px;}

  /* ticker */
  .ticker{position:absolute;left:0;right:0;bottom:0;height:46px;display:flex;align-items:center;
    background:linear-gradient(to top,rgba(8,11,15,.96),rgba(8,11,15,.7));border-top:2px solid var(--amber);overflow:hidden;}
  .ticker .tag{flex:none;height:100%;display:flex;align-items:center;padding:0 18px;background:var(--amber);color:#15130a;
    font-family:var(--cond);font-weight:800;letter-spacing:.12em;font-size:16px;}
  .ticker .mask{flex:1;overflow:hidden;position:relative;height:100%;}
  .ticker .track{position:absolute;top:0;height:100%;display:flex;align-items:center;white-space:nowrap;animation:crawl var(--crawl-dur,30s) linear infinite;}
  .ticker .g{display:inline-flex;align-items:center;gap:10px;padding:0 26px;font-family:var(--sans);font-size:16px;color:#e7eef5;}
  .ticker .g b{font-family:var(--cond);font-weight:700;letter-spacing:.04em;}
  .ticker .g .sc{color:var(--amber);font-family:var(--cond);font-weight:700;font-variant-numeric:tabular-nums;}
  @keyframes crawl{to{transform:translateX(-50%);}}
</style>
</head>
<body>
<div id="stage">
  <div class="netbug" id="netbug"><span class="logo">COURTVISION</span><span class="info"><span class="live">● LIVE</span> · <span id="venue">TD Garden</span></span></div>

  <div class="bug">
    <div class="team a" id="teamA">
      <span class="tab"></span>
      <span class="logo" id="logoA">B</span>
      <span class="abbr" id="abbrA">BOS</span>
      <span class="score" id="scoreA">0</span>
      <span class="poss"></span>
      <span class="tos" id="tosA"></span>
    </div>

    <div class="center">
      <div class="shot" id="shot"><span class="v" id="shotv">24</span><span class="l">SHOT</span></div>
      <div class="clock" id="clock">12:00</div>
      <div class="meta"><span class="bonus" id="bonusA" style="display:none">BONUS</span><span class="qtr" id="qtr">Q1</span><span class="bonus" id="bonusB" style="display:none">BONUS</span></div>
    </div>

    <div class="team b" id="teamB">
      <span class="tab"></span>
      <span class="logo" id="logoB">L</span>
      <span class="abbr" id="abbrB">LAL</span>
      <span class="score" id="scoreB">0</span>
      <span class="poss"></span>
      <span class="tos" id="tosB"></span>
    </div>
  </div>

  <div class="card" id="card">
    <div class="hd"><span class="num" id="pnum">0</span><div class="who"><div class="nm" id="pname"></div><div class="pos" id="pinfo"></div></div></div>
    <div class="stats">
      <div class="st"><div class="n" id="ppts">0</div><div class="k">PTS</div></div>
      <div class="st"><div class="n" id="preb">0</div><div class="k">REB</div></div>
      <div class="st"><div class="n" id="past">0</div><div class="k">AST</div></div>
      <div class="st"><div class="n" id="pfg">0-0</div><div class="k">FG</div></div>
    </div>
  </div>

  <div class="ticker" id="ticker">
    <div class="tag" id="tickerTag">AROUND THE LEAGUE</div>
    <div class="mask"><div class="track" id="track"></div></div>
  </div>
</div>

<script src="/packages/hoops/assets/state.js"></script>
<script>
  const g = (id) => document.getElementById(id);

  let state = null;
  let tickerKey = '';

  function pips(el, n) {
    el.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const s = document.createElement('i');
      if (i < n) s.className = 'on';
      el.appendChild(s);
    }
  }

  function qtrLabel(q) {
    if (q <= 4) return 'Q' + q;
    const ot = q - 4;
    return ot > 1 ? 'OT' + ot : 'OT';
  }

  function rebuildTicker(items, tag) {
    g('tickerTag').textContent = tag || '';
    const track = g('track');
    track.innerHTML = '';
    const run = () => {
      const f = document.createDocumentFragment();
      (items || []).forEach((line) => {
        const d = document.createElement('span');
        d.className = 'g';
        d.textContent = line;
        f.appendChild(d);
      });
      return f;
    };
    track.appendChild(run());
    track.appendChild(run()); // two runs → -50% loop
  }

  function applyState(s) {
    state = s;
    g('abbrA').textContent = s.teamA;
    g('abbrB').textContent = s.teamB;
    g('logoA').textContent = (s.teamA || 'A').charAt(0);
    g('logoB').textContent = (s.teamB || 'B').charAt(0);
    g('scoreA').textContent = s.scoreA;
    g('scoreB').textContent = s.scoreB;
    g('qtr').textContent = qtrLabel(+s.quarter || 1);
    g('teamA').classList.toggle('active', s.possession === 'a');
    g('teamB').classList.toggle('active', s.possession === 'b');
    g('bonusA').style.display = s.bonusA ? '' : 'none';
    g('bonusB').style.display = s.bonusB ? '' : 'none';
    pips(g('tosA'), +s.timeoutsA || 0);
    pips(g('tosB'), +s.timeoutsB || 0);
    g('netbug').style.display = s.netBugVisible ? '' : 'none';
    g('venue').textContent = s.venue || '';

    const pc = s.playerCard || {};
    g('card').classList.toggle('in', !!pc.visible);
    g('pnum').textContent = pc.number || '';
    g('pname').textContent = pc.name || '';
    g('pinfo').textContent = pc.info || '';
    g('ppts').textContent = pc.pts ?? 0;
    g('preb').textContent = pc.reb ?? 0;
    g('past').textContent = pc.ast ?? 0;
    g('pfg').textContent = pc.fg || '';

    g('ticker').style.display = (s.ticker && s.ticker.visible) ? '' : 'none';
    const tSpeed = (s.ticker && +s.ticker.speed) || 80;
    g('track').style.setProperty('--crawl-dur', (30 * 80 / tSpeed).toFixed(1) + 's');
    const key = JSON.stringify([s.ticker && s.ticker.messages, s.ticker && s.ticker.label]);
    if (key !== tickerKey) {
      tickerKey = key;
      rebuildTicker(s.ticker && s.ticker.messages, s.ticker && s.ticker.label);
    }
    tickClocks();
  }

  // ── clocks ──
  // Running clocks are stored as a deadline (clockEndsAt / shotEndsAt, epoch ms)
  // so reloads and reconnects hydrate to the correct remaining time; when
  // stopped, the static `clock` string / `shotClock` seconds are shown.
  function fmtGame(ms) {
    const s = ms / 1000;
    if (s < 60) return s.toFixed(1);
    const m = Math.floor(s / 60);
    return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }

  function parseClock(str) {
    const p = String(str || '0:00').split(':');
    return p.length === 2 ? ((+p[0] || 0) * 60 + (+p[1] || 0)) * 1000 : (+p[0] || 0) * 1000;
  }

  function tickClocks() {
    if (!state) return;
    const now = Date.now();
    const gameMs = (state.clock && state.clock.deadline > 0) ? Math.max(0, state.clock.deadline - now) : parseClock(state.clock && state.clock.value);
    g('clock').textContent = fmtGame(gameMs);
    const shotS = state.shotEndsAt > 0 ? Math.max(0, (state.shotEndsAt - now) / 1000) : +state.shotClock || 0;
    g('shotv').textContent = shotS <= 5 ? shotS.toFixed(1) : Math.ceil(shotS);
    g('shot').classList.toggle('danger', shotS <= 5);
  }

  (function loop() {
    tickClocks();
    requestAnimationFrame(loop);
  })();

  PConAirPackage.connect('hoops', applyState);
</script>
</body>
</html>
